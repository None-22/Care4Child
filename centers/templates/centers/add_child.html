{% extends 'base.html' %}
{% load static %}

{% block page_title %}تسجيل طفل جديد{% endblock %}

{% block content %}
<div class="row fade-in-up">
    <div class="col-12">

        <div class="row">
            <div class="col-12">
                <div class="ministry-banner mb-4 text-center text-md-start">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
                        <div class="mb-3 mb-md-0">
                            <h2 class="text-white mb-2"><i class="fas fa-id-card me-2"></i>تسجيل طفل جديد</h2>
                            <p class="mb-0" style="color: rgba(255,255,255,0.85);">يرجى تعبئة البيانات بدقة </p>
                        </div>
                        <div class="d-flex align-items-center mt-3 mt-md-0">
                            <a href="{% url 'centers:dashboard' %}"
                                class="btn btn-outline-light fw-bold rounded-pill px-4">
                                <i class="fas fa-arrow-left me-2"></i>عودة
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="saas-card p-4 p-md-5">
            <form method="POST" id="addChildForm">
                {% csrf_token %}

                <!-- Basic Info Section -->
                <div class="col-12 mt-1 mb-2">
                    <div class="ministry-banner"
                        style="border-radius: 50px; padding: 12px 40px; display: inline-block; margin-bottom: 0;">
                        <h5 style="margin: 0; font-weight: bold; color: white;">
                            <i class="fas fa-id-card me-2"></i>البيانات الأساسية للطفل
                        </h5>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small">الاسم الكامل</label>
                        <input type="text" name="child_name" class="form-control form-control-lg bg-light"
                            id="floatingChildName" placeholder="الاسم الرباعي للطفل" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">تاريخ الميلاد </label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fas fa-calendar-alt text-muted"></i></span>
                            <input type="text" name="dob"
                                class="form-control form-control-lg bg-light border-start-0 flatpickr-date"
                                id="floatingDob" placeholder="تاريخ الميلاد" required style="padding-right:0;">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">الجنس</label>
                        <select name="gender" class="form-select form-select-lg bg-light" id="floatingGender">
                            <option value="M">ذكر</option>
                            <option value="F">أنثى</option>
                        </select>
                    </div>
                </div>

                <!-- Location Section -->
                <div class="col-12 mt-4 mb-2">
                    <div class="ministry-banner"
                        style="border-radius: 50px; padding: 12px 40px; display: inline-block; margin-bottom: 0;">
                        <h5 style="margin: 0; font-weight: bold; color: white;">
                            <i class="fas fa-map-marker-alt me-2"></i>مكان وتفاصيل الميلاد
                        </h5>
                    </div>
                </div>

                <!-- Manual/Dropdown toggle -->
                <div class="bg-light rounded-md p-3 mb-4 border">
                    <div class="form-check form-switch m-0 d-flex align-items-center">
                        <input class="form-check-input ms-0 me-3 mt-0" type="checkbox" id="manualLocationSwitch"
                            style="transform: scale(1.2);">
                        <label class="form-check-label fw-bold text-indigo-900 cursor-pointer"
                            for="manualLocationSwitch">
                            إدخال المحافظة والمديرية يدوياً خارج نطاق المنظومة
                        </label>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <!-- 0. Country (يدوي فقط) -->
                    <div class="col-md-3 d-none" id="countryContainer">
                        <label class="form-label fw-bold text-muted small">الدولة</label>
                        <input type="text" name="country_text" class="form-control bg-light" id="countryInput"
                            placeholder="اكتب اسم الدولة">
                    </div>

                    <!-- 1. Governorate -->
                    <div class="col-md-4" id="govCol">
                        <label class="form-label fw-bold text-muted small">المحافظة</label>
                        <div id="govSelectContainer">
                            <select name="governorate_select" class="form-select bg-light" id="govSelect">
                                <option value="" selected disabled>جاري التحميل...</option>
                            </select>
                        </div>
                        <div class="d-none" id="govTextContainer">
                            <input type="text" name="governorate_text" class="form-control bg-light" id="govInput"
                                placeholder="اكتب اسم المحافظة">
                        </div>
                    </div>

                    <!-- 2. Directorate -->
                    <div class="col-md-4" id="dirCol">
                        <label class="form-label fw-bold text-muted small">المديرية</label>
                        <div id="dirSelectContainer">
                            <select name="directorate_select" class="form-select bg-light" id="dirSelect" disabled>
                                <option value="" selected disabled>اختر المديرية</option>
                            </select>
                        </div>
                        <div class="d-none" id="dirTextContainer">
                            <input type="text" name="directorate_text" class="form-control bg-light" id="dirInput"
                                placeholder="اكتب اسم المديرية">
                        </div>
                    </div>

                    <!-- 3. Place of birth -->
                    <div class="col-md-4" id="placeCol">
                        <label class="form-label fw-bold text-muted small">مكان الميلاد </label>
                        <input type="text" name="place_of_birth" class="form-control bg-light" id="placeOfBirth"
                            placeholder="التفاصيل" required>
                    </div>
                </div>

                <!-- Family Section -->
                <div class="col-12 mt-4 mb-2">
                    <div class="ministry-banner"
                        style="border-radius: 50px; padding: 12px 40px; display: inline-block; margin-bottom: 0;">
                        <h5 style="margin: 0; font-weight: bold; color: white;">
                            <i class="fas fa-users me-2"></i>صِلة القرابة والعائلة
                        </h5>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">اسم الأب </label>
                        <input type="text" name="father_name" class="form-control form-control-lg bg-light"
                            id="floatingFather" placeholder="اسم الأب الكامل" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small">اسم الأم </label>
                        <input type="text" name="mother_name" class="form-control form-control-lg bg-light"
                            id="floatingMother" placeholder="اسم الأم الكامل" required>
                    </div>
                </div>

                <div class="pt-2 d-flex justify-content-end gap-3">
                    <a href="{% url 'centers:dashboard' %}" class="btn btn-outline-secondary py-3 px-4 fs-5">
                        <i class="fas fa-times me-2"></i>إلغاء
                    </a>
                    <button type="submit" id="submitBtn" class="btn btn-primary-action py-3 px-5 fs-5">
                        <i class="fas fa-save me-2"></i>تسجيل الطفل
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{% static 'js/api.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', async function () {

        // ---- Date Picker ----
        flatpickr(".flatpickr-date", {
            locale: "ar",
            dateFormat: "Y-m-d",
            maxDate: "today",
            disableMobile: true,
            defaultDate: "today"
        });

        const govSelect = document.getElementById('govSelect');
        const dirSelect = document.getElementById('dirSelect');

        // ---- On Governorate Change -> Load Directorates ----
        // ⚠️ يجب تسجيل الـ listener أولاً قبل dispatchEvent
        govSelect.addEventListener('change', async function () {
            const govId = this.value;
            dirSelect.innerHTML = '<option value="" selected disabled>جاري جلب المديريات...</option>';
            dirSelect.disabled = true;
            if (!govId) return;

            try {
                const dirData = await apiFetch(`/api/directorates/?governorate=${govId}`);
                const dirs = Array.isArray(dirData) ? dirData : (dirData.results || []);
                dirSelect.innerHTML = '<option value="" selected disabled>اختر المديرية</option>';
                if (dirs.length > 0) {
                    dirs.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.id;
                        opt.textContent = d.name_ar;
                        dirSelect.appendChild(opt);
                    });
                    dirSelect.disabled = false;
                } else {
                    dirSelect.innerHTML = '<option value="" selected disabled>لا توجد مديريات مسجلة</option>';
                }
            } catch (e) {
                dirSelect.innerHTML = '<option value="" selected disabled>فشل التحميل</option>';
                console.error('Failed to load directorates:', e);
            }
        });

        // ---- Load Governorates from API ----
        try {
            const govData = await apiFetch('/api/governorates/');
            const govs = Array.isArray(govData) ? govData : (govData.results || []);
            govSelect.innerHTML = '<option value="" selected disabled>اختر المحافظة</option>';
            govs.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.name_ar;
                govSelect.appendChild(opt);
            });
            // ديفولت: إب
            const ibb = govs.find(g => g.name_ar.trim() === 'إب' || g.name_ar.trim() === 'اب');
            if (ibb) {
                govSelect.value = ibb.id;
                govSelect.dispatchEvent(new Event('change')); // الآن الـ listener موجود ✓
            }
        } catch (e) {
            govSelect.innerHTML = '<option value="" selected disabled>فشل التحميل</option>';
            console.error('Failed to load governorates:', e);
        }

        // ---- Manual location toggle ----
        document.getElementById('manualLocationSwitch').addEventListener('change', function () {
            const isManual = this.checked;
            document.getElementById('countryContainer').classList.toggle('d-none', !isManual);
            document.getElementById('govSelectContainer').classList.toggle('d-none', isManual);
            document.getElementById('govTextContainer').classList.toggle('d-none', !isManual);
            document.getElementById('dirSelectContainer').classList.toggle('d-none', isManual);
            document.getElementById('dirTextContainer').classList.toggle('d-none', !isManual);

            // صغّر الحقول الثلاثة لـ col-md-3 عند اليدوي وإلا col-md-4
            ['govCol', 'dirCol', 'placeCol'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.toggle('col-md-3', isManual);
                el.classList.toggle('col-md-4', !isManual);
            });

            govSelect.disabled = isManual;
            dirSelect.disabled = isManual;
            document.getElementById('govInput').required = isManual;
            document.getElementById('dirInput').required = isManual;
        });

        // ---- Prevent double-submit ----
        document.getElementById('addChildForm').addEventListener('submit', function () {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>جاري الحفظ ...';
        });

    });
</script>

{% endblock %}
