{% extends 'base.html' %}
{% load static %}

{% block page_title %}سجل التحصين الإلكتروني{% endblock %}

{% block content %}

<!-- Constrained Header & Search Area -->
<div class="row mb-5">
    <div class="col-lg-12 col-xl-9">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4">
            <div class="mb-3 mb-md-0">
                <h3 class="fw-bold text-primary"><i class="fas fa-book-medical me-2"></i>السجل العام</h3>
                <p class="text-muted mb-0">عرض تفصيلي لجميع الأطفال وحالة تطعيماتهم.</p>
            </div>
            <div class="d-flex align-items-center">
                <div class="btn-group me-3 shadow-sm rounded-pill" role="group">
                    <button type="button" id="btn-active" class="btn btn-primary rounded-start-pill px-4"
                        onclick="switchStatus('active')">
                        <i class="fas fa-child me-1"></i> قيد التحصين
                        <span class="badge bg-light text-primary ms-1" id="badge-active">—</span>
                    </button>
                    <button type="button" id="btn-archived" class="btn btn-outline-success rounded-end-pill px-4"
                        onclick="switchStatus('archived')">
                        <i class="fas fa-archive me-1"></i> المكتملين
                        <span class="badge bg-light text-success ms-1" id="badge-archived" style="display:none;"></span>
                    </button>
                </div>
                <a href="{% url 'centers:add_child' %}" class="btn btn-primary shadow-sm rounded-pill px-4">
                    <i class="fas fa-plus me-2"></i>تسجيل طفل
                </a>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="saas-card border-0 mb-0">
            <div class="card-body p-3">
                <div class="d-flex w-100">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-transparent border-0"><i
                                class="fas fa-search text-muted"></i></span>
                        <input type="text" id="search-input" class="form-control border-0 shadow-none ps-0"
                            placeholder="بحث عن طفل (الاسم، اسم الأب، رقم العائلة...)">
                        <button class="btn btn-primary px-4 rounded-pill m-1" onclick="doSearch()">
                            <i class="fas fa-search me-1"></i> بحث
                        </button>
                        <button class="btn btn-light text-danger px-3 rounded-pill m-1" id="btn-clear-search"
                            onclick="clearSearch()" title="إلغاء البحث" style="display:none;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Registry Table -->
<div class="saas-card border-0 mb-4" style="overflow: hidden;">
    <div class="card-body p-0">
        <div class="table-responsive" id="registry-scroll-container">
            <div id="registry-loading" class="d-flex justify-content-center align-items-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <span class="ms-3 text-muted fw-bold">جاري تحميل السجل...</span>
            </div>
            <!-- Table will be injected here by JS -->
            <div id="registry-table-container"></div>
        </div>
    </div>
</div>

<style>
    .sticky-col-start {
        position: sticky;
        right: 0;
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.08);
        border-right: 1px solid #dee2e6;
        background-color: #fff;
    }

    th {
        white-space: nowrap;
        font-family: 'Cairo', sans-serif;
    }

    .bg-status-taken {
        background-color: #dcfce7;
        color: #14532d;
    }

    .bg-status-overdue {
        background-color: #fee2e2;
        color: #7f1d1d;
    }

    .bg-status-due {
        background-color: #fef3c7;
        color: #78350f;
    }

    .bg-status-future {
        background-color: #ffffff;
    }

    .border-group-end {
        border-left: 2px solid #94a3b8 !important;
    }

    .registry-table {
        border-collapse: separate;
        border-spacing: 0;
    }
</style>

<script src="{% static 'js/api.js' %}"></script>
<script>
    // ============ State ============
    let currentStatus = 'active';
    let currentSearch = '';
    let vaccineGroups = [];   // [{label, doses: [{id, dose_number, age_in_months, is_group_end}]}]
    let flatHeader = [];      // flat list of all dose-columns
    let allChildren = [];     // raw children from API

    // ============ Boot ============
    document.addEventListener('DOMContentLoaded', async () => {
        await loadVaccineStructure();
        await loadChildren();

        document.getElementById('search-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') doSearch();
        });
    });

    // ============ Vaccine Structure (from API) ============
    async function loadVaccineStructure() {
        try {
            const vaccines = await apiFetch('/api/vaccines/');
            // API returns list; each has id, name_ar, schedules (list of {id, dose_number, age_in_months})
            vaccineGroups = [];
            flatHeader = [];
            const results = Array.isArray(vaccines) ? vaccines : (vaccines.results || []);
            results.forEach(vac => {
                if (!vac.schedules || vac.schedules.length === 0) return;
                const doses = [...vac.schedules].sort((a, b) => a.dose_number - b.dose_number);
                vaccineGroups.push({ label: vac.name_ar, doses: doses });
                doses.forEach((d, i) => {
                    flatHeader.push({ ...d, vaccine_id: vac.id, vaccine_name: vac.name_ar, is_group_end: (i === doses.length - 1) });
                });
            });
        } catch (e) {
            console.error('Failed to load vaccine structure', e);
        }
    }

    // ============ Children ============
    async function loadChildren() {
        document.getElementById('registry-loading').classList.remove('d-none');
        document.getElementById('registry-loading').classList.add('d-flex');
        document.getElementById('registry-table-container').innerHTML = '';

        // DRF BooleanFilter accepts 'True'/'False' or '1'/'0'
        const completedVal = currentStatus === 'archived' ? 'True' : 'False';
        let url = `/api/children/?is_completed=${completedVal}`;
        if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;

        try {
            const data = await apiFetch(url);
            allChildren = Array.isArray(data) ? data : (data.results || []);
            document.getElementById('registry-loading').classList.add('d-none');

            // Update badges
            if (currentStatus === 'active') {
                document.getElementById('badge-active').textContent = allChildren.length;
            } else {
                document.getElementById('badge-archived').textContent = allChildren.length;
                document.getElementById('badge-archived').style.display = '';
            }

            renderTable();
        } catch (e) {
            console.error('loadChildren error:', e);
            document.getElementById('registry-loading').innerHTML =
                `<div class="alert alert-danger m-3 w-100"><i class="fas fa-exclamation-circle me-2"></i>تعذر تحميل البيانات: ${e.message || ''}</div>`;
        }
    }

    // ============ Table Rendering ============
    function renderTable() {
        const container = document.getElementById('registry-table-container');

        if (allChildren.length === 0) {
            container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="fas fa-box-open fa-3x mb-3 opacity-50"></i>
                <p class="fw-bold mt-2">لا توجد سجلات مطابقة للبحث.</p>
            </div>`;
            return;
        }

        // Build header HTML
        let headerGroup = '';
        vaccineGroups.forEach(g => {
            const borderStyle = '';
            headerGroup += `<th colspan="${g.doses.length}" class="text-center align-middle py-3"
            style="background-color:#3498db;color:white;border:1px solid #2980b9;">${g.label}</th>`;
        });

        let headerDose = '';
        flatHeader.forEach(col => {
            const borderLeft = col.is_group_end ? 'border-left:2px solid #adb5bd;' : '';
            const ageLabel = formatAgeAr(col.age_in_months);
            headerDose += `<th class="small align-middle bg-light"
            style="min-width:100px;border:1px solid #dee2e6;color:#555;font-weight:600;${borderLeft}">
            <div class="d-flex flex-column py-1">
                <span>جرعة ${col.dose_number}</span>
                <span class="text-muted fw-normal mt-1" style="font-size:0.75rem;">${ageLabel}</span>
            </div></th>`;
        });

        // Build body rows
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let tbody = '';
        allChildren.forEach(child => {
            // Build a map: (vaccine_id, dose_number) -> record
            const recMap = {};
            const records = child.vaccine_records || [];
            records.forEach(rec => {
                recMap[`${rec.vaccine}_${rec.dose_number}`] = rec;
            });

            // Build cells
            let cells = '';
            flatHeader.forEach(col => {
                const key = `${col.vaccine_id}_${col.dose_number}`;
                const rec = recMap[key];
                const borderLeft = col.is_group_end ? 'border-left:2px solid #94a3b8;' : '';

                let cellContent = '';
                let statusClass = 'bg-status-future';

                if (rec) {
                    statusClass = 'bg-status-taken';
                    cellContent = `<div class="d-flex flex-column align-items-center">
                    <i class="fas fa-check text-success fs-5"></i>
                    <span class="text-success mt-1" style="font-size:0.75em;font-weight:bold;">${rec.date_given || ''}</span>
                </div>`;
                } else if (child.date_of_birth) {
                    const dob = new Date(child.date_of_birth);
                    const ageMonths = col.age_in_months;
                    const monthsInt = Math.floor(ageMonths);
                    const daysExtra = Math.round((ageMonths - monthsInt) * 30);
                    const dueDate = new Date(dob);
                    dueDate.setMonth(dueDate.getMonth() + monthsInt);
                    dueDate.setDate(dueDate.getDate() + daysExtra);
                    const fmtDue = dueDate.toISOString().slice(0, 10);

                    if (today > dueDate) {
                        statusClass = 'bg-status-overdue';
                        cellContent = `<div class="text-danger fw-bold" style="font-size:0.85em;">${fmtDue}</div>`;
                    } else if (today >= new Date(dueDate.getTime() - 14 * 86400000)) {
                        statusClass = 'bg-status-due';
                        cellContent = `<div class="text-warning fw-bold" style="font-size:0.85em;">${fmtDue}</div>`;
                    } else {
                        cellContent = `<div class="text-muted small" style="font-size:0.8em;opacity:0.4;">${fmtDue}</div>`;
                    }
                }

                cells += `<td class="align-middle ${statusClass}" style="border:1px solid #dee2e6;${borderLeft}">${cellContent}</td>`;
            });

            const initials = child.full_name ? child.full_name.charAt(0) : '?';
            tbody += `<tr>
            <td class="sticky-col-start fw-bold text-start p-3" style="z-index:5;background:#fff;border:1px solid #dee2e6;">
                <div class="d-flex align-items-center">
                    <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center me-2"
                        style="width:35px;height:35px;min-width:35px;font-size:0.9em;">${initials}</div>
                    <div>
                        <a href="/center/child/${child.id}/" class="text-decoration-none text-dark" style="font-size:0.95rem;">
                            ${child.full_name}
                        </a>
                    </div>
                </div>
            </td>
            ${cells}
        </tr>`;
        });

        container.innerHTML = `
        <table class="table table-bordered align-middle mb-0 text-center registry-table" style="min-width:1500px;">
            <thead style="position:sticky;top:0;z-index:20;">
                <tr>
                    <th rowspan="2" class="sticky-col-start align-middle shadow-sm bg-primary text-white"
                        style="width:250px;z-index:30;border:1px solid #2980b9;">
                        <div class="py-2">الطفل</div>
                    </th>
                    ${headerGroup}
                </tr>
                <tr>${headerDose}</tr>
            </thead>
            <tbody>${tbody}</tbody>
        </table>`;
    }

    // ============ Helpers ============
    function formatAgeAr(months) {
        if (months === 0) return 'عند الولادة';
        if (months === 72) return 'سن المدرسة';
        if (months < 1) return `${Math.round(months * 30)} يوم`;
        return `${months} شهر`;
    }

    function switchStatus(status) {
        currentStatus = status;
        currentSearch = '';
        document.getElementById('search-input').value = '';
        document.getElementById('btn-clear-search').style.display = 'none';

        if (status === 'active') {
            document.getElementById('btn-active').className = 'btn btn-primary rounded-start-pill px-4';
            document.getElementById('btn-archived').className = 'btn btn-outline-success rounded-end-pill px-4';
            document.getElementById('badge-archived').style.display = 'none';
        } else {
            document.getElementById('btn-active').className = 'btn btn-outline-primary rounded-start-pill px-4';
            document.getElementById('btn-archived').className = 'btn btn-success rounded-end-pill px-4';
        }
        loadChildren();
    }

    function doSearch() {
        currentSearch = document.getElementById('search-input').value.trim();
        document.getElementById('btn-clear-search').style.display = currentSearch ? '' : 'none';
        loadChildren();
    }

    function clearSearch() {
        currentSearch = '';
        document.getElementById('search-input').value = '';
        document.getElementById('btn-clear-search').style.display = 'none';
        loadChildren();
    }
</script>

{% endblock %}
