{% extends 'base.html' %}
{% load static %}

{% block page_title %}سجل التحصين الإلكتروني{% endblock %}

{% block content %}

<!-- Header Area -->
<div class="row">
    <div class="col-12">
        <div class="ministry-banner mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
                <div class="mb-3 mb-md-0">
                    <h2 class="text-white mb-2"><i class="fas fa-book-medical me-2"></i>السجل العام</h2>
                    <p class="mb-0" style="color: rgba(255,255,255,0.85);">عرض تفصيلي لجميع الأطفال وحالة تطعيماتهم.</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'centers:add_child' %}"
                        class="btn btn-light text-primary fw-bold px-4 shadow-sm rounded-pill">
                        <i class="fas fa-plus me-2"></i> تسجيل طفل جديد
                    </a>
                    <a href="{% url 'centers:dashboard' %}" class="btn btn-outline-light fw-bold px-4 rounded-pill">
                        <i class="fas fa-chart-pie me-2"></i> لوحة الإدارة
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Search Bar -->
<div class="row mb-4">
    <div class="col-lg-8 col-xl-7">
        <div class="d-flex flex-column flex-md-row gap-2">
            <div class="input-group flex-grow-1">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="search-input" class="form-control border-start-0"
                    placeholder="ابحث باسم الطفل..." oninput="debounceSearch()">
            </div>
            <select id="status-filter" class="form-select w-auto" style="min-width: 240px;"
                onchange="switchStatus(this.value)">
                <option value="active" selected>قيد التحصين</option>
                <option value="archived">مكتملين التحصين</option>
            </select>
        </div>
    </div>
</div>

<!-- Registry Table -->
<div class="row">
    <div class="col-12">
        <div class="ministry-card">
            <div class="ministry-card-header">
                <h3><i class="fas fa-list text-primary"></i> السجل الإلكتروني للتحصين</h3>
                <span class="badge bg-secondary-subtle text-dark">إجمالي النتائج: <span
                        id="children-count">—</span></span>
            </div>
            <div id="registry-scroll-container" class="table-responsive"
                style="min-height: 400px; position: relative; overflow-x: auto;">
                <div id="registry-loading" class="d-none justify-content-center align-items-center"
                    style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); z-index: 50;">
                    <div class="spinner-border text-primary spinner-border-sm"></div>
                    <span class="ms-3 text-muted fw-bold">جاري تحميل السجل...</span>
                </div>
                <!-- Table will be injected here by JS -->
                <div id="registry-table-container"></div>
            </div>
        </div>
    </div>
</div>

<style>
    .sticky-col-start {
        position: sticky;
        right: 0;
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.08);
        border-right: 1px solid #dee2e6;
        background-color: #fff;
    }

    th {
        white-space: nowrap;
        font-family: 'Cairo', sans-serif;
    }

    .bg-status-taken {
        background-color: #dcfce7;
        color: #14532d;
    }

    .bg-status-overdue {
        background-color: #fee2e2;
        color: #7f1d1d;
    }

    .bg-status-due {
        background-color: #fef3c7;
        color: #78350f;
    }

    .bg-status-future {
        background-color: #ffffff;
    }

    .border-group-end {
        border-left: 2px solid #94a3b8 !important;
    }

    .registry-table {
        border-collapse: separate;
        border-spacing: 0;
    }

    .registry-table th {
        border: 1px solid var(--c-blue-800);
        vertical-align: middle;
        text-align: center;
    }

    .registry-table thead {
        background: linear-gradient(to left, var(--c-blue-400) 0%, var(--c-blue-700) 100%);
    }

    .header-main {
        background: transparent !important;
        color: white;
        font-weight: 800;
        padding: 12px;
    }

    .header-sub {
        background: transparent !important;
        color: white;
        font-weight: 700;
        padding: 8px;
        font-size: 0.9rem;
    }
</style>

<script src="{% static 'js/api.js' %}"></script>
<script>
    // ============ State ============
    let currentStatus = 'active';
    let currentSearch = '';
    let vaccineGroups = [];   // [{label, doses: [{id, dose_number, age_in_months, is_group_end}]}]
    let flatHeader = [];      // flat list of all dose-columns
    let allChildren = [];     // raw children from API

    // ============ Boot ============
    document.addEventListener('DOMContentLoaded', async () => {
        await loadVaccineStructure();
        await loadChildren();
    });

    // ============ Vaccine Structure (Hardcoded to match book) ============
    async function loadVaccineStructure() {
        // Restored simplified digital structure (consolidated doses per vaccine)
        const bookStructure = [
            { main: 'السل', key: 'BCG', doses: [{ label: 'تمهيدية', num: 1, age: 'عند الولادة', ageMonths: 0, id: 'Bacillus Calmette-Guérin' }] },
            { main: 'الكبد البائي', key: 'HepB', doses: [{ label: 'تمهيدية', num: 1, age: 'عند الولادة', ageMonths: 0, id: 'Hepatitis B Vaccine' }] },
            {
                main: 'الشلل', key: 'Polio', sub: [
                    {
                        subName: 'شلل فموي', key: 'OPV', doses: [
                            { label: 'تمهيدية', num: 0, age: 'عند الولادة', ageMonths: 0, id: 'Oral Polio Vaccine' },
                            { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Oral Polio Vaccine' },
                            { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Oral Polio Vaccine' },
                            { label: 'الثالثة', num: 3, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Oral Polio Vaccine' },
                            { label: 'الرابعة', num: 4, age: '9 اشهر  ', ageMonths: 18, id: 'Oral Polio Vaccine' },
                            { label: 'الخامسة', num: 5, age: ' 18 شهر', ageMonths: 60, id: 'Oral Polio Vaccine' },
                        ]
                    },
                    {
                        subName: 'شلل حقن', key: 'IPV', doses: [
                            { label: 'الأولى', num: 1, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Inactivated Polio Vaccine' },
                            { label: 'الثانية', num: 2, age: '9 أشهر', ageMonths: 9, id: 'Inactivated Polio Vaccine' },
                        ]
                    }
                ]
            },
            {
                main: 'الخماسي', key: 'Penta', doses: [
                    { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Pentavalent Vaccine' },
                    { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Pentavalent Vaccine' },
                    { label: 'الثالثة', num: 3, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Pentavalent Vaccine' },
                    { label: 'الرابعة', num: 4, age: '18 شهر', ageMonths: 18, id: 'Pentavalent Vaccine' },
                ]
            },
            {
                main: 'المكورات الرئوية', key: 'Pneumo', doses: [
                    { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Pneumococcal Conjugate Vaccine' },
                    { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Pneumococcal Conjugate Vaccine' },
                    { label: 'الثالثة', num: 3, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Pneumococcal Conjugate Vaccine' },
                ]
            },
            {
                main: 'الروتا', key: 'Rota', doses: [
                    { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Rotavirus Vaccine' },
                    { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Rotavirus Vaccine' },
                ]
            },
            {
                main: 'الحصبة', key: 'MR', doses: [
                    { label: 'الأولى', num: 1, age: '9 أشهر', ageMonths: 9, id: 'Measles-Rubella Vaccine' },
                    { label: 'الثانية', num: 2, age: '18 شهر', ageMonths: 18, id: 'Measles-Rubella Vaccine' },
                    { label: 'الثالثة', num: 3, age: 'سن المدرسة', ageMonths: 60, id: 'Measles-Rubella Vaccine' },
                ]
            },
            {
                main: 'فيتامين أ', key: 'VitA', doses: [
                    { label: 'الأولى', num: 1, age: '9 أشهر', ageMonths: 9, id: 'Vitamin A Supplementation' },
                    { label: 'الثانية', num: 2, age: '18 شهر', ageMonths: 18, id: 'Vitamin A Supplementation' },
                    { label: 'الثالثة', num: 3, age: 'سن المدرسة', ageMonths: 60, id: 'Vitamin A Supplementation' },
                ]
            },
            {
                main: 'الثنائي', key: 'TD', doses: [
                    { label: 'تنشيطية', num: 1, age: 'سن المدرسة', ageMonths: 60, id: 'Tetanus-Diphtheria Vaccine' },
                ]
            }
        ];

        vaccineGroups = bookStructure;
        flatHeader = [];

        bookStructure.forEach(group => {
            if (group.sub) {
                group.sub.forEach((sub, sIdx) => {
                    sub.doses.forEach((d, dIdx) => {
                        flatHeader.push({ ...d, is_group_end: (sIdx === group.sub.length - 1 && dIdx === sub.doses.length - 1) });
                    });
                });
            } else {
                group.doses.forEach((d, dIdx) => {
                    flatHeader.push({ ...d, is_group_end: (dIdx === group.doses.length - 1) });
                });
            }
        });
    }

    // ============ Children ============
    async function loadChildren() {
        const loadingEl = document.getElementById('registry-loading');
        loadingEl.classList.remove('d-none');
        loadingEl.classList.add('d-flex');

        // We will not clear the table HTML immediately to prevent vertical jitter
        // document.getElementById('registry-table-container').innerHTML = '';

        // DRF BooleanFilter accepts 'True'/'False' or '1'/'0'
        let url = `/api/children/`;
        let params = [];

        if (currentStatus === 'active') {
            params.push('is_completed=False');
        } else if (currentStatus === 'archived') {
            params.push('is_completed=True');
        } // if 'all', we don't send is_completed filter

        if (currentSearch) {
            params.push(`search=${encodeURIComponent(currentSearch)}`);
        }

        if (params.length > 0) {
            url += '?' + params.join('&');
        }

        try {
            const data = await apiFetch(url);
            allChildren = Array.isArray(data) ? data : (data.results || []);

            // Generate and set the table HTML
            renderTable();

            // Hide loading after render
            loadingEl.classList.remove('d-flex');
            loadingEl.classList.add('d-none');

            document.getElementById('children-count').textContent = allChildren.length;
        } catch (e) {
            console.error('loadChildren error:', e);
            loadingEl.classList.remove('d-flex');
            loadingEl.classList.add('d-none');
            document.getElementById('registry-table-container').innerHTML =
                `<div class="alert alert-danger m-3 w-100"><i class="fas fa-exclamation-circle me-2"></i>تعذر تحميل البيانات: ${e.message || ''}</div>`;
        }
    }

    // ============ Table Rendering ============
    function renderTable() {
        const container = document.getElementById('registry-table-container');

        if (allChildren.length === 0) {
            container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="fas fa-box-open fa-3x mb-3 opacity-50"></i>
                <p class="fw-bold mt-2">لا توجد سجلات مطابقة للبحث.</p>
            </div>`;
            return;
        }

        // Build header HTML
        let mainRow = '';
        let subRow = '';
        let doseRow = '';

        vaccineGroups.forEach(g => {
            if (g.sub) {
                // Polio has sub groups
                let totalDoses = 0;
                let subHtml = '';
                g.sub.forEach(sub => {
                    totalDoses += sub.doses.length;
                    subHtml += `<th colspan="${sub.doses.length}" class="header-sub">${sub.subName}</th>`;
                });
                mainRow += `<th colspan="${totalDoses}" class="header-main" rowspan="1">${g.main}</th>`;
                subRow += subHtml;
            } else {
                mainRow += `<th colspan="${g.doses.length}" class="header-main" rowspan="2">${g.main}</th>`;
            }
        });

        flatHeader.forEach(col => {
            const borderLeft = col.is_group_end ? 'border-left:2px solid #adb5bd;' : '';
            doseRow += `<th class="small align-middle bg-light"
            style="min-width:100px;border:1px solid #dee2e6;color:#555;font-weight:600;${borderLeft}">
            <div class="d-flex flex-column py-1">
                <span>${col.label}</span>
                <span class="text-muted fw-normal mt-1" style="font-size:0.75rem;">${col.age}</span>
            </div></th>`;
        });

        // Build body rows
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let tbody = '';
        allChildren.forEach(child => {
            // Build a map: ("Vaccine Name_DoseNumber") -> record
            const recMap = {};
            const records = child.vaccine_records || [];
            records.forEach(rec => {
                // Notice we use name_en (or vaccine_name if it comes configured from serializer)
                // Actually the api gives id and vaccine_name
                // Let's map by English name which we hardcoded
                recMap[`${rec.vaccine_name}_${rec.dose_number}`] = rec;
            });

            // Rebuild map mapping from AR to EN keying
            records.forEach(rec => {
                let recName = rec.vaccine_name ? rec.vaccine_name.trim() : '';

                // Fallback robust matching for names coming from API
                let enName = recName;
                if (recName.includes('السل')) enName = 'Bacillus Calmette-Guérin';
                else if (recName.includes('الكبد')) enName = 'Hepatitis B Vaccine';
                else if (recName.includes('شلل') && recName.includes('فموي')) enName = 'Oral Polio Vaccine';
                else if (recName.includes('شلل') && recName.includes('حقن')) enName = 'Inactivated Polio Vaccine';
                else if (recName.includes('خماسي')) enName = 'Pentavalent Vaccine';
                else if (recName.includes('مكورات') || recName.includes('رئوية')) enName = 'Pneumococcal Conjugate Vaccine';
                else if (recName.includes('روتا')) enName = 'Rotavirus Vaccine';
                else if (recName.includes('حصبة')) enName = 'Measles-Rubella Vaccine';
                else if (recName.includes('فيتامين')) enName = 'Vitamin A Supplementation';
                else if (recName.includes('ثنائي')) enName = 'Tetanus-Diphtheria Vaccine';

                recMap[`${enName}_${rec.dose_number}`] = rec;
            });

            // Build cells
            let cells = '';
            flatHeader.forEach(col => {
                const key = `${col.id}_${col.num}`;
                const rec = recMap[key];
                const borderLeft = col.is_group_end ? 'border-left:2px solid #94a3b8;' : '';

                let cellContent = '';
                if (rec) {
                    statusClass = 'bg-status-taken';
                    cellContent = `<div class="d-flex flex-column align-items-center">
                    <i class="fas fa-check text-success fs-5"></i>
                    <span class="text-success mt-1" style="font-size:0.75em;font-weight:bold;">${rec.date_given || ''}</span>
                </div>`;
                } else if (child.date_of_birth && col.ageMonths !== undefined) {
                    const dob = new Date(child.date_of_birth);
                    const ageMonths = col.ageMonths;
                    const monthsInt = Math.floor(ageMonths);
                    const daysExtra = Math.round((ageMonths - monthsInt) * 30);
                    const dueDate = new Date(dob);
                    dueDate.setMonth(dueDate.getMonth() + monthsInt);
                    dueDate.setDate(dueDate.getDate() + daysExtra);
                    const fmtDue = dueDate.toISOString().slice(0, 10);

                    if (today > dueDate) {
                        statusClass = 'bg-status-overdue';
                        cellContent = `<div class="text-danger fw-bold" style="font-size:0.85em;">${fmtDue}</div>`;
                    } else if (today >= new Date(dueDate.getTime() - 14 * 86400000)) {
                        statusClass = 'bg-status-due';
                        cellContent = `<div class="text-warning fw-bold" style="font-size:0.85em;">${fmtDue}</div>`;
                    } else {
                        cellContent = `<div class="text-muted small" style="font-size:0.8em;opacity:0.4;">${fmtDue}</div>`;
                    }
                } else {
                    cellContent = `<div class="text-muted small" style="font-size:0.8em;opacity:0.4;">—</div>`;
                }

                cells += `<td class="align-middle ${statusClass}" style="border:1px solid #dee2e6;${borderLeft}">${cellContent}</td>`;
            });

            tbody += `<tr>
            <td class="sticky-col-start fw-bold text-start p-3" style="z-index:5;background:#fff;border:1px solid #dee2e6; white-space: nowrap;">
                <div class="d-flex align-items-center">
                    <div>
                        <a href="/center/child/${child.id}/" class="text-decoration-none text-dark" style="font-size:0.95rem;">
                            ${child.full_name}
                        </a>
                    </div>
                </div>
            </td>
            ${cells}
        </tr>`;
        });

        container.innerHTML = `
        <table class="table table-bordered align-middle mb-0 text-center registry-table" style="min-width: 2800px;">
            <thead style="position:sticky;top:0;z-index:20;">
                <th rowspan="3" class="sticky-col-start align-middle shadow-sm"
                    style="width: 400px; min-width: 350px; z-index: 30; background: linear-gradient(to right, var(--c-blue-400) 0%, var(--c-blue-700) 100%); border: 1px solid #000; font-weight: 800; color: #000 !important;">
                    <div class="py-2">الطفل</div>
                </th>
                    ${mainRow}
                </tr>
                <tr>${subRow}</tr>
                <tr>${doseRow}</tr>
            </thead>
            <tbody>${tbody}</tbody>
        </table>`;
    }

    // ============ Helpers ============
    function formatAgeAr(months) {
        if (months === 0) return 'عند الولادة';
        if (months === 72) return 'سن المدرسة';
        if (months < 1) return `${Math.round(months * 30)} يوم`;
        return `${months} شهر`;
    }

    function switchStatus(status) {
        currentStatus = status;
        currentSearch = '';
        document.getElementById('search-input').value = '';
        loadChildren();
    }

    let searchTimeout;
    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentSearch = document.getElementById('search-input').value.trim();
            loadChildren();
        }, 500);
    }
</script>

{% endblock %}
