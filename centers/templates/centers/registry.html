{% extends 'base.html' %}
{% load static %}

{% block page_title %}سجل التحصين الإلكتروني{% endblock %}

{% block content %}

<!-- Header Area -->
<div class="row">
    <div class="col-12">
        <div class="ministry-banner mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
                <div class="mb-3 mb-md-0">
                    <h2 class="text-white mb-2"><i class="fas fa-book-medical me-2"></i>السجل العام</h2>
                    <p class="mb-0" style="color: rgba(255,255,255,0.85);">عرض تفصيلي لجميع الأطفال وحالة تطعيماتهم.</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'centers:add_child' %}"
                        class="btn btn-light text-primary fw-bold px-4 shadow-sm rounded-pill">
                        <i class="fas fa-plus me-2"></i> تسجيل طفل جديد
                    </a>
                    <a href="{% url 'centers:dashboard' %}" class="btn btn-outline-light fw-bold px-4 rounded-pill">
                        <i class="fas fa-chart-pie me-2"></i> لوحة الإدارة
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Search Bar & Filters -->
<div class="row mb-4">
    <div class="col-12">
        <div class="saas-card p-3 bg-white">
            <div class="d-flex flex-column flex-md-row gap-2 mb-3">
                <div class="input-group flex-grow-1">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="search-input" class="form-control border-start-0 bg-light"
                        placeholder="ابحث باسم الطفل أو ولي الأمر..." oninput="debounceSearch()">
                </div>
                <select id="status-filter" class="form-select w-auto bg-light" style="min-width: 200px;"
                    onchange="applyFilters()">
                    <option value="all">الجميع</option>
                    <option value="active" selected>قيد التحصين</option>
                    <option value="archived">مكتملين التحصين</option>
                </select>
                <!-- زر إظهار/إخفاء الفلاتر المتقدمة -->
                <button class="btn border bg-light text-muted d-flex align-items-center px-3" type="button"
                    data-bs-toggle="collapse" data-bs-target="#advancedFilters" aria-expanded="false"
                    aria-controls="advancedFilters"
                    onmouseover="this.classList.remove('bg-light', 'text-muted'); this.classList.add('btn-primary', 'text-white')"
                    onmouseout="this.classList.remove('btn-primary', 'text-white'); this.classList.add('bg-light', 'text-muted')">
                    <i class="fas fa-filter me-2"></i> فلاتر متقدمة
                </button>
            </div>

            <!-- Advanced Filters (Collapsible) -->
            <div class="collapse" id="advancedFilters">
                <div class="row g-2 pt-2 border-top">
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">الجنس</label>
                        <select id="gender-filter" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="">الكل</option>
                            <option value="M">ذكر</option>
                            <option value="F">أنثى</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">سنة الميلاد</label>
                        <select id="year-filter" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="">الكل</option>
                            <!-- يتم ملئها بـ JS -->
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">شهر الميلاد</label>
                        <select id="month-filter" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="">الكل</option>
                            <option value="1">يناير (1)</option>
                            <option value="2">فبراير (2)</option>
                            <option value="3">مارس (3)</option>
                            <option value="4">أبريل (4)</option>
                            <option value="5">مايو (5)</option>
                            <option value="6">يونيو (6)</option>
                            <option value="7">يوليو (7)</option>
                            <option value="8">أغسطس (8)</option>
                            <option value="9">سبتمبر (9)</option>
                            <option value="10">أكتوبر (10)</option>
                            <option value="11">نوفمبر (11)</option>
                            <option value="12">ديسمبر (12)</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted mb-1">العمر الحالي</label>
                        <select id="age-filter" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="">الكل</option>
                            <option value="0">حديث ولادة (0 شهر)</option>
                            <option value="1">1 شهر</option>
                            <option value="2">2 شهر</option>
                            <option value="3">3 أشهر</option>
                            <option value="4">4 أشهر</option>
                            <option value="6">6 أشهر</option>
                            <option value="9">9 أشهر</option>
                            <option value="12">سنة واحدة (12 شهر)</option>
                            <option value="18">سنة ونصف (18 شهر)</option>
                            <option value="24">سنتين (24 شهر)</option>
                        </select>
                    </div>
                    <div class="col-12 mt-2 text-end">
                        <button class="btn btn-sm btn-light text-danger" onclick="clearFilters()"><i
                                class="fas fa-times me-1"></i>مسح الفلاتر</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Registry Table -->
<div class="row">
    <div class="col-12">
        <div class="ministry-card">
            <div class="ministry-card-header">
                <h3><i class="fas fa-list text-primary"></i> السجل الإلكتروني للتحصين</h3>
                <span class="badge bg-secondary-subtle text-dark">إجمالي النتائج: <span
                        id="children-count">—</span></span>
            </div>
            <div id="registry-scroll-container" class="table-responsive"
                style="min-height: 400px; position: relative; overflow-x: auto;">
                <div id="registry-loading" class="d-none justify-content-center align-items-center"
                    style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); z-index: 50;">
                    <div class="spinner-border text-primary spinner-border-sm"></div>
                    <span class="ms-3 text-muted fw-bold">جاري تحميل السجل...</span>
                </div>
                <!-- Table will be injected here by JS -->
                <div id="registry-table-container"></div>
            </div>
            <!-- Pagination Bar -->
            <div class="d-flex justify-content-center align-items-center gap-4 bg-white border-top rounded-bottom pagination-container"
                id="pagination-bar" style="display:none!important;">

                <!-- Prev Button Container (في العربي يمين) -->
                <div id="pag-prev-container"></div>

                <!-- Page Numbers Array -->
                <nav aria-label="Page navigation" class="d-flex align-items-center gap-2">
                    <span class="text-muted small fw-bold">الصفحة:</span>
                    <ul class="pagination mb-0 align-items-center gap-2" id="pagination-controls">
                        <!-- Numbers go here -->
                    </ul>
                </nav>

                <!-- Next Button Container (في العربي يسار) -->
                <div id="pag-next-container"></div>
            </div>
        </div>
    </div>
</div>

<style>
    .sticky-col-start {
        position: sticky;
        right: 0;
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.08);
        border-right: 1px solid #dee2e6;
        background-color: #fff;
    }

    th {
        white-space: nowrap;
        font-family: 'Cairo', sans-serif;
    }

    .bg-status-taken {
        background-color: #dcfce7;
        color: #14532d;
    }

    .bg-status-overdue {
        background-color: #fee2e2;
        color: #7f1d1d;
    }

    .bg-status-due {
        background-color: #fef3c7;
        color: #78350f;
    }

    .bg-status-future {
        background-color: #ffffff;
    }

    .border-group-end {
        border-left: 2px solid #94a3b8 !important;
    }

    .registry-table {
        border-collapse: separate;
        border-spacing: 0;
    }

    .registry-table th {
        border: 1px solid var(--c-blue-800);
        vertical-align: middle;
        text-align: center;
    }

    .registry-table thead {
        background: linear-gradient(to left, var(--c-blue-400) 0%, var(--c-blue-700) 100%);
    }

    .header-main {
        background: transparent !important;
        color: white;
        font-weight: 800;
        padding: 12px;
    }

    .header-sub {
        background: transparent !important;
        color: white;
        font-weight: 700;
        padding: 8px;
        font-size: 0.9rem;
    }

    /* Pagination Luxury Styling */
    .pagination-container {
        padding: 16px 24px;
        box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.02);
    }

    .pagination .page-item .page-link {
        border: none;
        background: transparent;
        color: #64748b;
        font-weight: 700;
        min-width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.2s ease-in-out;
    }

    .pagination .page-item:not(.disabled) .page-link:hover {
        background: #f1f5f9;
        color: var(--c-blue-700);
    }

    .pagination .page-item.active .page-link {
        background: var(--c-blue-500);
        color: white;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
    }

    .pagination .page-item.disabled .page-link {
        color: #cbd5e1;
        cursor: not-allowed;
        background: transparent;
    }

    .pagination .page-text-btn .page-link {
        min-width: auto;
        padding: 0 16px;
    }
</style>

<script src="{% static 'js/api.js' %}"></script>
<script>
    // ============ State ============
    let currentStatus = 'active';
    let currentSearch = '';
    let vaccineGroups = [];   // [{label, doses: [{id, dose_number, age_in_months, is_group_end}]}]
    let flatHeader = [];      // flat list of all dose-columns
    let allChildren = [];     // raw children from API
    let currentPage = 1;
    let totalCount = 0;
    let totalPages = 1;
    const PAGE_SIZE = 10;

    // ============ Boot ============
    document.addEventListener('DOMContentLoaded', async () => {
        await loadVaccineStructure();
        await loadChildren();
    });

    // ============ Vaccine Structure (Hardcoded to match book) ============
    async function loadVaccineStructure() {
        // Restored simplified digital structure (consolidated doses per vaccine)
        const bookStructure = [
            { main: 'السل', key: 'BCG', doses: [{ label: 'تمهيدية', num: 1, age: 'عند الولادة', ageMonths: 0, id: 'Bacillus Calmette-Guérin' }] },
            { main: 'الكبد البائي', key: 'HepB', doses: [{ label: 'تمهيدية', num: 1, age: 'عند الولادة', ageMonths: 0, id: 'Hepatitis B Vaccine' }] },
            {
                main: 'الشلل', key: 'Polio', sub: [
                    {
                        subName: 'شلل فموي', key: 'OPV', doses: [
                            { label: 'تمهيدية', num: 0, age: 'عند الولادة', ageMonths: 0, id: 'Oral Polio Vaccine' },
                            { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Oral Polio Vaccine' },
                            { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Oral Polio Vaccine' },
                            { label: 'الثالثة', num: 3, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Oral Polio Vaccine' },
                            { label: 'الرابعة', num: 4, age: '9 اشهر  ', ageMonths: 18, id: 'Oral Polio Vaccine' },
                            { label: 'الخامسة', num: 5, age: ' 18 شهر', ageMonths: 60, id: 'Oral Polio Vaccine' },
                        ]
                    },
                    {
                        subName: 'شلل حقن', key: 'IPV', doses: [
                            { label: 'الأولى', num: 1, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Inactivated Polio Vaccine' },
                            { label: 'الثانية', num: 2, age: '9 أشهر', ageMonths: 9, id: 'Inactivated Polio Vaccine' },
                        ]
                    }
                ]
            },
            {
                main: 'الخماسي', key: 'Penta', doses: [
                    { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Pentavalent Vaccine' },
                    { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Pentavalent Vaccine' },
                    { label: 'الثالثة', num: 3, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Pentavalent Vaccine' },
                    { label: 'الرابعة', num: 4, age: '18 شهر', ageMonths: 18, id: 'Pentavalent Vaccine' },
                ]
            },
            {
                main: 'المكورات الرئوية', key: 'Pneumo', doses: [
                    { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Pneumococcal Conjugate Vaccine' },
                    { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Pneumococcal Conjugate Vaccine' },
                    { label: 'الثالثة', num: 3, age: '3 أشهر ونصف', ageMonths: 3.5, id: 'Pneumococcal Conjugate Vaccine' },
                ]
            },
            {
                main: 'الروتا', key: 'Rota', doses: [
                    { label: 'الأولى', num: 1, age: 'شهر ونصف', ageMonths: 1.5, id: 'Rotavirus Vaccine' },
                    { label: 'الثانية', num: 2, age: 'شهرين ونصف', ageMonths: 2.5, id: 'Rotavirus Vaccine' },
                ]
            },
            {
                main: 'الحصبة', key: 'MR', doses: [
                    { label: 'الأولى', num: 1, age: '9 أشهر', ageMonths: 9, id: 'Measles-Rubella Vaccine' },
                    { label: 'الثانية', num: 2, age: '18 شهر', ageMonths: 18, id: 'Measles-Rubella Vaccine' },
                    { label: 'الثالثة', num: 3, age: 'سن المدرسة', ageMonths: 60, id: 'Measles-Rubella Vaccine' },
                ]
            },
            {
                main: 'فيتامين أ', key: 'VitA', doses: [
                    { label: 'الأولى', num: 1, age: '9 أشهر', ageMonths: 9, id: 'Vitamin A Supplementation' },
                    { label: 'الثانية', num: 2, age: '18 شهر', ageMonths: 18, id: 'Vitamin A Supplementation' },
                    { label: 'الثالثة', num: 3, age: 'سن المدرسة', ageMonths: 60, id: 'Vitamin A Supplementation' },
                ]
            },
            {
                main: 'الثنائي', key: 'TD', doses: [
                    { label: 'تنشيطية', num: 1, age: 'سن المدرسة', ageMonths: 60, id: 'Tetanus-Diphtheria Vaccine' },
                ]
            }
        ];

        vaccineGroups = bookStructure;
        flatHeader = [];

        bookStructure.forEach(group => {
            if (group.sub) {
                group.sub.forEach((sub, sIdx) => {
                    sub.doses.forEach((d, dIdx) => {
                        flatHeader.push({ ...d, is_group_end: (sIdx === group.sub.length - 1 && dIdx === sub.doses.length - 1) });
                    });
                });
            } else {
                group.doses.forEach((d, dIdx) => {
                    flatHeader.push({ ...d, is_group_end: (dIdx === group.doses.length - 1) });
                });
            }
        });
    }

    // ============ Children ============
    async function loadChildren(page = 1) {
        currentPage = page;
        const loadingEl = document.getElementById('registry-loading');
        loadingEl.classList.remove('d-none');
        loadingEl.classList.add('d-flex');

        let params = [`page=${page}`];

        if (currentStatus === 'active') params.push('is_completed=False');
        else if (currentStatus === 'archived') params.push('is_completed=True');

        if (currentSearch) params.push(`search=${encodeURIComponent(currentSearch)}`);

        // --- فلاتر متقدمة ---
        const gender = document.getElementById('gender-filter')?.value;
        if (gender) params.push(`gender=${gender}`);

        const year = document.getElementById('year-filter')?.value;
        if (year) params.push(`birth_year=${year}`);

        const month = document.getElementById('month-filter')?.value;
        if (month) params.push(`birth_month=${month}`);

        const age = document.getElementById('age-filter')?.value;
        if (age) params.push(`age_in_months=${age}`);

        const url = `/api/children/?` + params.join('&');

        try {
            const data = await apiFetch(url);
            // DRF paginated response: {count, next, previous, results}
            allChildren = data.results || [];
            totalCount = data.count || 0;
            totalPages = Math.ceil(totalCount / PAGE_SIZE);

            renderTable();
            renderPagination();

            loadingEl.classList.remove('d-flex');
            loadingEl.classList.add('d-none');

            document.getElementById('children-count').textContent = totalCount;
        } catch (e) {
            console.error('loadChildren error:', e);
            loadingEl.classList.remove('d-flex');
            loadingEl.classList.add('d-none');
            document.getElementById('registry-table-container').innerHTML =
                `<div class="alert alert-danger m-3 w-100"><i class="fas fa-exclamation-circle me-2"></i>تعذر تحميل البيانات: ${e.message || ''}</div>`;
        }
    }

    // ============ Pagination Rendering ============
    function renderPagination() {
        const bar = document.getElementById('pagination-bar');
        const ctrl = document.getElementById('pagination-controls');
        const prevCont = document.getElementById('pag-prev-container');
        const nextCont = document.getElementById('pag-next-container');

        if (totalPages <= 1) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';

        // Build page number buttons (show max 7 around current)
        let pages = [];
        const delta = 2;
        for (let p = 1; p <= totalPages; p++) {
            if (p === 1 || p === totalPages || (p >= currentPage - delta && p <= currentPage + delta)) {
                pages.push(p);
            }
        }

        // 1. Prev Button (السابق - يمين باللغة العربية)
        prevCont.innerHTML = `
            <button class="btn btn-light rounded-pill px-5 py-2 fw-bold text-muted border-0 shadow-sm d-flex align-items-center"
                ${currentPage === 1 ? 'disabled style="opacity:0.5"' : `onclick="goPage(${currentPage - 1})"`}>
                <i class="fas fa-chevron-right me-2 small"></i> السابق
            </button>`;

        // 2. Numbers
        let html = '';
        let prev = null;
        for (const p of pages) {
            if (prev && p - prev > 1) {
                html += `<li class="page-item disabled"><span class="page-link fs-5 border-0 bg-transparent text-muted mt-n1">...</span></li>`;
            }
            if (p === currentPage) {
                html += `<li class="page-item active">
                    <a class="page-link" href="#" onclick="return false;">${p}</a>
                </li>`;
            } else {
                html += `<li class="page-item">
                    <a class="page-link" href="#" onclick="goPage(${p}); return false;">${p}</a>
                </li>`;
            }
            prev = p;
        }
        ctrl.innerHTML = html;

        // 3. Next Button (التالي - يسار باللغة العربية)
        nextCont.innerHTML = `
            <button class="btn btn-light rounded-pill px-5 py-2 fw-bold text-muted border-0 shadow-sm d-flex align-items-center"
                ${currentPage === totalPages ? 'disabled style="opacity:0.5"' : `onclick="goPage(${currentPage + 1})"`}>
                التالي <i class="fas fa-chevron-left ms-2 small"></i>
            </button>`;
    }

    function goPage(p) {
        if (p < 1 || p > totalPages) return;
        // Scroll to top of table smoothly
        document.getElementById('registry-scroll-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        loadChildren(p);
    }

    // ============ Table Rendering ============
    function renderTable() {
        const container = document.getElementById('registry-table-container');

        if (allChildren.length === 0) {
            container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="fas fa-box-open fa-3x mb-3 opacity-50"></i>
                <p class="fw-bold mt-2">لا توجد سجلات مطابقة للبحث.</p>
            </div>`;
            return;
        }

        // Build header HTML
        let mainRow = '';
        let subRow = '';
        let doseRow = '';

        vaccineGroups.forEach(g => {
            if (g.sub) {
                // Polio has sub groups
                let totalDoses = 0;
                let subHtml = '';
                g.sub.forEach(sub => {
                    totalDoses += sub.doses.length;
                    subHtml += `<th colspan="${sub.doses.length}" class="header-sub">${sub.subName}</th>`;
                });
                mainRow += `<th colspan="${totalDoses}" class="header-main" rowspan="1">${g.main}</th>`;
                subRow += subHtml;
            } else {
                mainRow += `<th colspan="${g.doses.length}" class="header-main" rowspan="2">${g.main}</th>`;
            }
        });

        flatHeader.forEach(col => {
            const borderLeft = col.is_group_end ? 'border-left:2px solid #adb5bd;' : '';
            doseRow += `<th class="small align-middle bg-light"
            style="min-width:100px;border:1px solid #dee2e6;color:#555;font-weight:600;${borderLeft}">
            <div class="d-flex flex-column py-1">
                <span>${col.label}</span>
                <span class="text-muted fw-normal mt-1" style="font-size:0.75rem;">${col.age}</span>
            </div></th>`;
        });

        // Build body rows
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let tbody = '';
        allChildren.forEach(child => {
            // Build a map: ("Vaccine Name_DoseNumber") -> record
            const recMap = {};
            const records = child.vaccine_records || [];
            records.forEach(rec => {
                // Notice we use name_en (or vaccine_name if it comes configured from serializer)
                // Actually the api gives id and vaccine_name
                // Let's map by English name which we hardcoded
                recMap[`${rec.vaccine_name}_${rec.dose_number}`] = rec;
            });

            // Rebuild map mapping from AR to EN keying
            records.forEach(rec => {
                let recName = rec.vaccine_name ? rec.vaccine_name.trim() : '';

                // Fallback robust matching for names coming from API
                let enName = recName;
                if (recName.includes('السل')) enName = 'Bacillus Calmette-Guérin';
                else if (recName.includes('الكبد')) enName = 'Hepatitis B Vaccine';
                else if (recName.includes('شلل') && recName.includes('فموي')) enName = 'Oral Polio Vaccine';
                else if (recName.includes('شلل') && recName.includes('حقن')) enName = 'Inactivated Polio Vaccine';
                else if (recName.includes('خماسي')) enName = 'Pentavalent Vaccine';
                else if (recName.includes('مكورات') || recName.includes('رئوية')) enName = 'Pneumococcal Conjugate Vaccine';
                else if (recName.includes('روتا')) enName = 'Rotavirus Vaccine';
                else if (recName.includes('حصبة')) enName = 'Measles-Rubella Vaccine';
                else if (recName.includes('فيتامين')) enName = 'Vitamin A Supplementation';
                else if (recName.includes('ثنائي')) enName = 'Tetanus-Diphtheria Vaccine';

                recMap[`${enName}_${rec.dose_number}`] = rec;
            });

            // Build cells
            let cells = '';
            flatHeader.forEach(col => {
                const key = `${col.id}_${col.num}`;
                const rec = recMap[key];
                const borderLeft = col.is_group_end ? 'border-left:2px solid #94a3b8;' : '';

                let cellContent = '';
                if (rec) {
                    statusClass = 'bg-status-taken';
                    cellContent = `<div class="d-flex flex-column align-items-center">
                    <i class="fas fa-check text-success fs-5"></i>
                    <span class="text-success mt-1" style="font-size:0.75em;font-weight:bold;">${rec.date_given || ''}</span>
                </div>`;
                } else if (child.date_of_birth && col.ageMonths !== undefined) {
                    const dob = new Date(child.date_of_birth);
                    const ageMonths = col.ageMonths;
                    const monthsInt = Math.floor(ageMonths);
                    const daysExtra = Math.round((ageMonths - monthsInt) * 30);
                    const dueDate = new Date(dob);
                    dueDate.setMonth(dueDate.getMonth() + monthsInt);
                    dueDate.setDate(dueDate.getDate() + daysExtra);
                    const fmtDue = dueDate.toISOString().slice(0, 10);

                    if (today > dueDate) {
                        statusClass = 'bg-status-overdue';
                        cellContent = `<div class="text-danger fw-bold" style="font-size:0.85em;">${fmtDue}</div>`;
                    } else if (today >= new Date(dueDate.getTime() - 14 * 86400000)) {
                        statusClass = 'bg-status-due';
                        cellContent = `<div class="text-warning fw-bold" style="font-size:0.85em;">${fmtDue}</div>`;
                    } else {
                        cellContent = `<div class="text-muted small" style="font-size:0.8em;opacity:0.4;">${fmtDue}</div>`;
                    }
                } else {
                    cellContent = `<div class="text-muted small" style="font-size:0.8em;opacity:0.4;">—</div>`;
                }

                cells += `<td class="align-middle ${statusClass}" style="border:1px solid #dee2e6;${borderLeft}">${cellContent}</td>`;
            });

            tbody += `<tr>
            <td class="sticky-col-start fw-bold text-start p-3" style="z-index:5;background:#fff;border:1px solid #dee2e6; white-space: nowrap;">
                <div class="d-flex align-items-center">
                    <div>
                        <a href="/center/child/${child.id}/" class="text-decoration-none text-dark" style="font-size:0.95rem;">
                            ${child.full_name}
                        </a>
                    </div>
                </div>
            </td>
            ${cells}
        </tr>`;
        });

        container.innerHTML = `
        <table class="table table-bordered align-middle mb-0 text-center registry-table" style="min-width: 2800px;">
            <thead style="position:sticky;top:0;z-index:20;">
                <th rowspan="3" class="sticky-col-start align-middle shadow-sm"
                    style="width: 400px; min-width: 350px; z-index: 30; background: linear-gradient(to right, var(--c-blue-400) 0%, var(--c-blue-700) 100%); border: 1px solid #000; font-weight: 800; color: #000 !important;">
                    <div class="py-2">الطفل</div>
                </th>
                    ${mainRow}
                </tr>
                <tr>${subRow}</tr>
                <tr>${doseRow}</tr>
            </thead>
            <tbody>${tbody}</tbody>
        </table>`;
    }

    // ============ Helpers ============
    // ============ Helpers & Filters ============
    function formatAgeAr(months) {
        if (months === 0) return 'عند الولادة';
        if (months === 72) return 'سن المدرسة';
        if (months < 1) return `${Math.round(months * 30)} يوم`;
        return `${months} شهر`;
    }

    // Initialize year filter options dynamically
    function initYearFilter() {
        const yearSelect = document.getElementById('year-filter');
        const currentYear = new Date().getFullYear();
        // Generates from current year down to 10 years ago
        for (let i = 0; i <= 10; i++) {
            const y = currentYear - i;
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            yearSelect.appendChild(opt);
        }
    }

    // Call on load
    document.addEventListener('DOMContentLoaded', () => {
        initYearFilter();
    });

    function applyFilters() {
        currentStatus = document.getElementById('status-filter').value;
        currentSearch = document.getElementById('search-input').value.trim();
        loadChildren(1); // always reset to page 1 when filters change
    }

    function clearFilters() {
        document.getElementById('status-filter').value = 'all';
        document.getElementById('search-input').value = '';
        document.getElementById('gender-filter').value = '';
        document.getElementById('year-filter').value = '';
        document.getElementById('month-filter').value = '';
        document.getElementById('age-filter').value = '';
        applyFilters();
    }

    let searchTimeout;
    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            applyFilters();
        }, 500);
    }
</script>

{% endblock %}
