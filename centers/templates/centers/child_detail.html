{% extends 'base.html' %}
{% load static %}

{% block page_title %}بطاقة الطفل الرقمية{% endblock %}

{% block content %}

<!-- ===== Container with child ID injected by Django ===== -->
<div id="child-page" data-child-id="{{ child_id }}">

    <!-- Back Button & Header -->
    <div class="row">
        <div class="col-12">
            <div class="ministry-banner mb-4">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-center">
                    <div class="mb-3 mb-md-0">
                        <span class="d-block mb-1" style="color: rgba(255,255,255,0.85); font-size: 0.95rem;">رقم
                            الملف</span>
                        <h2 class="text-white mb-0" id="detail-access-code" style="font-family: monospace;">—</h2>
                    </div>
                    <div class="d-flex align-items-center flex-wrap gap-2">
                        <a href="{% url 'centers:registry' %}" class="btn btn-outline-light fw-bold rounded-pill px-4">
                            <i class="fas fa-arrow-left me-2"></i>عودة
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="child-loading" style="display:flex; justify-content:center; align-items:center; padding:3rem;">
        <div class="spinner-border text-primary" role="status"></div>
        <span class="ms-3 text-muted fw-bold">جاري تحميل بيانات الطفل...</span>
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="child-content" style="display:none;">

        <!-- Child Info Row -->
        <div class="row g-4 mb-5">
            <!-- Main Info Card -->
            <div class="col-md-8">
                <div class="saas-card p-4 h-100 position-relative overflow-hidden">
                    <div class="position-absolute top-0 end-0 p-3">
                        <i class="fas fa-baby fa-8x text-primary" style="opacity: 0.05;"></i>
                    </div>
                    <div class="d-flex align-items-start">
                        <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center fs-1 me-4 shadow"
                            style="width: 80px; height: 80px;">
                            <i class="fas fa-baby"></i>
                        </div>
                        <div>
                            <h2 class="fw-bold mb-1" id="detail-name">—</h2>
                            <p class="text-muted mb-3"><i class="fas fa-female me-2"></i>والدته: <span
                                    id="detail-mother">—</span></p>
                            <div class="d-flex gap-3 flex-wrap">
                                <span class="badge bg-light text-dark border px-3 py-2 mb-2">
                                    <i class="fas fa-calendar-alt me-2 text-primary"></i><span id="detail-dob">—</span>
                                </span>
                                <span class="badge bg-light text-dark border px-3 py-2 mb-2">
                                    <i class="fas fa-venus-mars me-2 text-danger"></i><span id="detail-gender">—</span>
                                </span>
                                <span class="badge bg-light text-dark border px-3 py-2 mb-2">
                                    <i class="fas fa-map-marker-alt me-2 text-success"></i><span
                                        id="detail-location">—</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Card -->
            <div class="col-md-4">
                <div
                    class="saas-card p-4 h-100 d-flex flex-column justify-content-center align-items-center text-center">
                    <div id="detail-status-icon" class="w-100"></div>
                </div>
            </div>
        </div>

        <!-- Vaccine Schedule -->
        <div class="row">
            <div class="col-12">
                <h3 class="mb-4"><i class="fas fa-syringe text-primary me-2"></i>جدول الزيارات واللقاحات</h3>
                <div class="row g-4" id="visits-container"></div>
            </div>
        </div>

    </div><!-- /#child-content -->

    <!-- Error State -->
    <div id="child-error" style="display:none;" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i>تعذر تحميل بيانات الطفل. يرجى تحديث الصفحة.
    </div>

</div><!-- /#child-page -->

<script src="{% static 'js/api.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const childId = document.getElementById('child-page').dataset.childId;
        if (!childId) return;

        try {
            const child = await apiFetch(`/api/children/${childId}/`);
            renderChild(child);
        } catch (e) {
            console.error(e);
            document.getElementById('child-loading').style.display = 'none';
            document.getElementById('child-error').style.display = '';
        }
    });

    function renderChild(child) {
        document.getElementById('child-loading').style.display = 'none';
        document.getElementById('child-content').style.display = '';

        // Basic info
        const fam = child.family || {};
        document.getElementById('detail-access-code').textContent = fam.access_code || '—';
        document.getElementById('detail-name').textContent = child.full_name || '—';
        document.getElementById('detail-mother').textContent = fam.mother_name || '—';
        document.getElementById('detail-dob').textContent = child.date_of_birth || '—';
        document.getElementById('detail-gender').textContent = child.gender === 'M' ? 'ذكر' : 'أنثى';

        const gov = child.birth_governorate_name || '';
        const dir = child.birth_directorate_name || '';
        document.getElementById('detail-location').textContent = [gov, dir].filter(Boolean).join(' - ') || '—';

        // Status icon
        const statusEl = document.getElementById('detail-status-icon');
        if (child.is_completed) {
            statusEl.innerHTML = `
            <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
            <h4 class="text-success">مكتمل التحصين</h4>
            <p class="text-muted small">تم أخذ جميع اللقاحات المقررة</p>`;
        } else {
            statusEl.innerHTML = `
            <i class="fas fa-hourglass-half fa-4x text-warning mb-3"></i>
            <h4 class="text-warning text-dark">نشط / قيد المتابعة</h4>
            <p class="text-muted small">ما زال هناك لقاحات مستحقة</p>`;
        }

        const schedule = child.full_vaccine_schedule || [];

        // --- بناء الزيارات ---
        // نستخدم Map بدل Object لأن Object keys تُحوَّل إلى string
        // وهذا يسبب تلخبط الترتيب مع الأعداد العشرية مثل 1.5
        const visitsMap = new Map();

        schedule.forEach(item => {
            const age = item.age_in_months;
            if (!visitsMap.has(age)) {
                let label;
                if (age === 0) label = 'عند الولادة';
                else if (age === 1.5) label = 'عمر شهر ونصف';
                else if (age === 2.5) label = 'عمر شهرين ونصف';
                else if (age === 3.5) label = 'عمر ثلاثة أشهر ونصف';
                else if (age === 9) label = 'عمر 9 أشهر';
                else if (age === 18) label = 'عمر سنة ونصف';
                else if (age === 72) label = 'سن دخول المدرسة (6 سنوات)';
                else {
                    const absAge = Math.abs(age);
                    if (absAge === 1) label = 'عمر شهر';
                    else if (absAge === 2) label = 'عمر شهرين';
                    else if (absAge >= 3 && absAge <= 10) label = `عمر ${age} أشهر`;
                    else if (Number.isInteger(age)) label = `عمر ${age} شهراً`;
                    else label = `عمر ${age} شهر`;
                }
                visitsMap.set(age, { label, vaccines: [] });
            }
            visitsMap.get(age).vaccines.push(item);
        });

        // ترتيب الزيارات حسب العمر (تصاعدي)
        const visitsList = [...visitsMap.keys()].sort((a, b) => a - b);

        // ترتيب اللقاحات داخل كل زيارة حسب رقم الجرعة
        visitsList.forEach(age => {
            visitsMap.get(age).vaccines.sort((a, b) => a.dose_number - b.dose_number);
        });

        let visitsHtml = '';

        visitsList.forEach(age => {
            const visit = visitsMap.get(age);

            let vaccineItems = '';

            visit.vaccines.forEach(item => {
                const taken = item.is_taken;

                let actionEl = '';
                if (taken) {
                    actionEl = `
                    <div class="text-end" style="min-width: 90px;">
                        <span class="text-success small fw-bold d-block mb-1"><i class="fas fa-check-circle me-1"></i>مكتمل</span>
                        <span class="text-muted small" style="font-size:0.75rem;"><i class="fas fa-calendar-alt me-1"></i>${item.date_given || '—'}</span>
                    </div>`;
                } else {
                    actionEl = `
                    <div class="text-end" style="min-width: 90px;">
                        <button
                            class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm record-vaccine-btn"
                            data-child-id="${child.id}"
                            data-schedule-id="${item.schedule_id}"
                            data-vaccine-name="${item.vaccine_name_ar || item.vaccine_name || ''}">
                            <i class="fas fa-syringe me-1"></i>تسجيل
                        </button>
                    </div>`;

                }

                vaccineItems += `
                <div class="border border-light p-3 mb-2 bg-white shadow-sm d-flex justify-content-between align-items-center" style="border-radius: 12px;">
                    <div class="d-flex align-items-center pe-3">
                        <div class="bg-light rounded-circle d-flex align-items-center justify-content-center me-3 text-primary border" style="width: 40px; height: 40px; flex-shrink: 0;">
                            <i class="fas fa-vial fs-6"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold mb-1 text-dark fs-6 lh-base">${item.vaccine_name_ar || item.vaccine_name || '—'}</h6>
                            <div class="text-muted small">جرعة ${item.dose_number}</div>
                        </div>
                    </div>
                    ${actionEl}
                </div>`;
            });

            visitsHtml += `
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="saas-card h-100 border-0 px-3 py-4 bg-light">
                <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-light">
                    <div class="bg-white text-primary rounded d-flex align-items-center justify-content-center me-3 shadow-sm border" style="width: 45px; height: 45px; flex-shrink: 0;">
                        <i class="fas fa-calendar-check fs-5"></i>
                    </div>
                    <h5 class="fw-bold text-primary mb-0 lh-base">${visit.label}</h5>
                </div>
                <div class="vaccine-list">
                    ${vaccineItems}
                </div>
            </div>
        </div>`;
        });

        document.getElementById('visits-container').innerHTML = visitsHtml || `
        <div class="col-12 text-center text-muted py-4">
            <i class="fas fa-syringe fa-2x mb-2 opacity-25"></i>
            <p>لا يوجد جدول تطعيمات مسجل لهذا الطفل.</p>
        </div>`;

        // --- AJAX لأزرار تسجيل اللقاح ---
        document.getElementById('visits-container').addEventListener('click', async (e) => {
            const btn = e.target.closest('.record-vaccine-btn');
            if (!btn) return;

            const childId = btn.dataset.childId;
            const scheduleId = btn.dataset.scheduleId;
            const vaccineName = btn.dataset.vaccineName;

            // منع الضغط المزدوج
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>جاري...';

            try {
                const response = await fetch(`/center/vaccine/record/${childId}/${scheduleId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCsrfToken(),
                        'X-Requested-With': 'XMLHttpRequest',
                    }
                });

                if (response.ok || response.redirected) {
                    // نجح التسجيل — حدّث الزر مباشرة بدون reload
                    const today = new Date().toISOString().split('T')[0];
                    const actionDiv = btn.closest('div.text-end');
                    actionDiv.innerHTML = `
                        <span class="text-success small fw-bold d-block mb-1">
                            <i class="fas fa-check-circle me-1"></i>مكتمل
                        </span>
                        <span class="text-muted small" style="font-size:0.75rem;">
                            <i class="fas fa-calendar-alt me-1"></i>${today}
                        </span>`;

                    // اختياري: إظهار Toast نجاح خفيف
                    showToast(`<i class="fas fa-check-circle me-1"></i> تم تسجيل ${vaccineName || 'اللقاح'} بنجاح`, 'success');
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-syringe me-1"></i>تسجيل';
                    showToast('حدث خطأ أثناء التسجيل، حاول مجدداً', 'danger');
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-syringe me-1"></i>تسجيل';
                showToast('تعذر الاتصال بالخادم', 'danger');
            }
        });
    }

    function getCsrfToken() {
        const cookie = document.cookie.split(';').find(c => c.trim().startsWith('csrftoken='));
        return cookie ? cookie.trim().split('=')[1] : '';
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container') || (() => {
            const el = document.createElement('div');
            el.id = 'toast-container';
            el.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;';
            document.body.appendChild(el);
            return el;
        })();

        const toast = document.createElement('div');
        toast.className = `alert alert-${type} shadow px-4 py-2 mb-2`;
        toast.style.cssText = 'border-radius:30px; font-size:0.9rem; min-width:250px; text-align:center;';
        toast.innerHTML = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }
</script>

{% endblock %}
